# ============================================
# ChenRTP 配置文件
# 随机传送插件设置
# ============================================

# 随机传送半径（以出生点为中心的正方形边长）
radius: 10000

# 最大尝试次数（寻找安全位置）
max-attempts: 100

# 冷却时间（秒）
cooldown: 30

# 是否避开水面
avoid-water: true

# 是否避开岩浆
avoid-lava: true

# 是否避开危险生物附近（预留功能）
avoid-mobs: true

# 消息前缀（支持颜色代码 &a, &c 等）
prefix: "&6[&eRTP&6] &7"

# 自定义消息
messages:
  teleporting: "&a正在为你寻找安全的随机位置..."
  teleport-success: "&a随机传送成功！"
  on-cooldown: "&c你还需要等待 &e{time} &c秒才能再次使用！"
  fallback-teleport: "&e未能找到理想位置，已传送到出生点附近。"
  no-permission: "&c你没有权限使用此命令！"
  reload-success: "&a配置已重新加载！"
